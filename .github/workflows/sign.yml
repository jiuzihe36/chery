name: 奇瑞汽车签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          CHERY_ACCOUNT: ${{ secrets.CHERY_ACCOUNT }}
        run: python chery_sign.py
